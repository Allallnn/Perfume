<!-- login.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfume - Login</title>

    <link rel="stylesheet" href="login.css" />
  </head>

  <body class="border border-5">
    <div class="logo">
      <div class="logo-circle">PZ</div>
      <span>Perfumrye</span>
    </div>
    <div class="container">
      <div class="login-container">
        <h1>Welcome Back</h1>

        <p class="sub-text">Fill in your information to access your account.</p>

        <form>
          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your Email" />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" />
          </div>

          <div class="options">
            <div class="remember">
              <input type="checkbox" checked />
              <span>Remember Me</span>
            </div>

            <a href="#" class="forgot">Forgot Password</a>
          </div>

          <button class="signin-btn" type="submit">Sign In</button>

          <div class="form-img-div">
            <img src="assets/Frame 113.png" alt="form-img2" />
          </div>

          <button class="google-btn" type="button">
            <span><img src="assets/🦆 icon _google_.png" alt="" /></span>
            Continue with Google
          </button>

          <div class="bottom-text">
            Don’t have an account?
            <a href="signup.html">Sign Up</a>
          </div>
        </form>
      </div>
    </div>
    
  </body>
</html>
